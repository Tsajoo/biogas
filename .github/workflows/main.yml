name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Flutter ─────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      # ── 3. Regenerate native platforms ─────────────────────────────────────
      # --org com.example --project-name biogas → bundle ID = com.example.biogas
      # This matches your Firebase project exactly.
      - name: Regenerate iOS & Android
        run: |
          rm -rf ios/ android/
          flutter create --org com.example --project-name biogas --platforms=android,ios .

      # ── 4. Patch project.pbxproj BEFORE Flutter reads it ───────────────────
      #
      #  ROOT CAUSE OF "Development Team required" ERROR:
      #  Flutter's Dart tooling reads project.pbxproj itself and throws this
      #  error before invoking xcodebuild. Setting CODE_SIGNING_ALLOWED=NO
      #  in every build configuration bypasses the check entirely.
      #
      #  ROOT CAUSE OF 47KB / "unable to locate main binary" ERROR:
      #  In the previous workflow, we called xcodebuild directly. This skips
      #  Flutter's `flutter assemble` step which compiles Dart to native binary.
      #  The app bundle was just an empty shell with no executable inside.
      #  FIX: We use `flutter build ios --release --no-codesign` which runs
      #  assemble first, then xcodebuild. We just need pbxproj patched so
      #  Flutter does not bail out on the signing check before it gets there.
      #
      - name: Patch project.pbxproj — disable signing
        run: |
          python3 - <<'PYEOF'
          import re, pathlib

          pbx = pathlib.Path("ios/Runner.xcodeproj/project.pbxproj")
          txt = pbx.read_text()

          def patch_config_block(match):
              block = match.group(0)
              overrides = {
                  "CODE_SIGNING_ALLOWED":           "NO",
                  "CODE_SIGNING_REQUIRED":          "NO",
                  "CODE_SIGN_STYLE":                "Manual",
                  "CODE_SIGN_IDENTITY":             '""',
                  "PROVISIONING_PROFILE_SPECIFIER": '""',
                  "DEVELOPMENT_TEAM":               '""',
              }
              for key, val in overrides.items():
                  block, n = re.subn(rf'{key} = [^;]+;', f'{key} = {val};', block)
                  if n == 0:
                      block = block.replace(
                          "buildSettings = {",
                          f"buildSettings = {{\n\t\t\t\t{key} = {val};"
                      )
              return block

          txt = re.sub(r'buildSettings = \{[^}]*\}', patch_config_block, txt, flags=re.DOTALL)
          txt = re.sub(r'ProvisioningStyle = Automatic;', 'ProvisioningStyle = Manual;', txt)

          pbx.write_text(txt)
          print("pbxproj patched OK")
          PYEOF

      # ── 5. Patch Info.plist — ATS + background modes ───────────────────────
      #
      #  ios/ is recreated every run so we must re-apply these every time.
      #  Without NSAllowsArbitraryLoads, Firebase HTTPS calls silently fail
      #  on jailbroken iOS producing a white screen on launch.
      #
      - name: Patch Info.plist
        run: |
          python3 - <<'PYEOF'
          import plistlib, pathlib

          plist_path = pathlib.Path("ios/Runner/Info.plist")
          with plist_path.open("rb") as f:
              data = plistlib.load(f)

          data.setdefault("NSAppTransportSecurity", {})
          data["NSAppTransportSecurity"]["NSAllowsArbitraryLoads"] = True

          modes = data.setdefault("UIBackgroundModes", [])
          for mode in ["fetch", "remote-notification"]:
              if mode not in modes:
                  modes.append(mode)

          with plist_path.open("wb") as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)

          print("Info.plist patched OK")
          PYEOF

      # ── 6. Install pub dependencies ────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 7. Configure Podfile ───────────────────────────────────────────────
      - name: Configure Podfile
        run: |
          sed -i '' '/^post_install do |installer|/,/^end$/d' ios/Podfile

          cat << 'EOF' >> ios/Podfile

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
              end
            end
          end
          EOF

      # ── 8. Pod install ─────────────────────────────────────────────────────
      - name: Pod install
        run: cd ios && pod install --repo-update

      # ── 9. Build with Flutter (compiles Dart binary + calls xcodebuild) ────
      #
      #  IMPORTANT: Do NOT replace this with a raw xcodebuild call.
      #  flutter build ios runs flutter assemble first, which compiles the
      #  Dart code into a native binary and embeds it into the app bundle.
      #  Calling xcodebuild directly skips this step and produces a 47kb
      #  empty shell with no main binary (parse error 303).
      #
      - name: Build unsigned app
        run: flutter build ios --release --no-codesign

      # ── 10. Verify Runner.app has a real binary ────────────────────────────
      - name: Verify binary exists in app bundle
        run: |
          APP="build/ios/iphoneos/Runner.app"
          BINARY="$APP/Runner"

          if [ ! -d "$APP" ]; then
            echo "Runner.app not found at $APP"
            exit 1
          fi

          if [ ! -f "$BINARY" ]; then
            echo "Main binary missing from bundle"
            ls -lah "$APP"
            exit 1
          fi

          SIZE=$(du -sh "$APP" | cut -f1)
          BIN_SIZE=$(du -sh "$BINARY" | cut -f1)
          echo "Runner.app: $SIZE | Binary: $BIN_SIZE"

          BIN_BYTES=$(stat -f%z "$BINARY")
          if [ "$BIN_BYTES" -lt 1000000 ]; then
            echo "Warning: binary is suspiciously small (${BIN_BYTES} bytes) — check build logs"
          fi

      # ── 11. Package as IPA ─────────────────────────────────────────────────
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/
          echo "Final IPA: $(du -sh biogas.ipa)"

      # ── 12. Upload artifact ────────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas-trollstore.ipa
          path: biogas.ipa