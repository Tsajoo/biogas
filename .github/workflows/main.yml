name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:  # manual trigger only
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'   # adjust to your project's Flutter version
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # Force the iOS build to skip code signing entirely
      - name: Build iOS app (unsigned)
        run: |
          flutter build ios --release --no-codesign

      # Manually create an unsigned IPA from the .app bundle
      - name: Create IPA archive
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: biogas-unsigned
          path: biogas.ipa
