name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (3.19.6)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: false

      # 1. Generate both native folders FIRST so plugins have places to latch onto
      - name: Generate Native Platforms
        run: flutter create --platforms=android,ios .

      # 2. Pull dependencies now that native project directories exist
      - name: Install dependencies
        run: flutter pub get

      # 3. Force Flutter to generate the ephemeral Swift Package files required by Xcode
      - name: Prepare iOS SPM plugins
        run: flutter build ios --config-only

      # 4. Inject the Firebase plist placeholder before compiling
      - name: Ensure GoogleService-Info.plist exists (placeholder)
        run: |
          mkdir -p ios/Runner
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            cat > ios/Runner/GoogleService-Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_GCM_ENABLED</key><false/>
            <key>IS_SIGNIN_ENABLED</key><false/>
            <key>GOOGLE_APP_ID</key><string>1:123456789:ios:abcdef</string>
            <key>GCM_SENDER_ID</key><string>123456789</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>BUNDLE_ID</key><string>com.example.biogas</string>
            <key>PROJECT_ID</key><string>biogas11</string>
            <key>STORAGE_BUCKET</key><string>biogas11.appspot.com</string>
          </dict>
          </plist>
          EOF
          fi

      # 5. Build the application binaries without codesigning
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      # 6. Bundle the payload for TrollStore installation
      - name: Create IPA archive
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/

      # 7. Upload the final artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas-unsigned
          path: biogas.ipa
