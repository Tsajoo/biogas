name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Generate Native Platforms
        run: |
          rm -rf ios/
          rm -rf android/
          flutter create --org com.example --project-name biogas --platforms=android,ios .

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Podfile
        run: flutter build ios --config-only --no-codesign
        
      - name: Nuke Xcode Signing & Fix Headers
        run: |
          # Strip out default Flutter post_install block
          sed -i '' '/post_install do |installer|/,/^end/d' ios/Podfile
          
          # Append the master override script
          cat << 'EOF' >> ios/Podfile
          
          post_install do |installer|
            # 1. Fix Firebase Strict Header Issue
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
              end
            end
            
            # 2. Force Xcode to completely drop signing requirements
            runner_project_path = File.expand_path("../Runner.xcodeproj", __FILE__)
            runner_project = Xcodeproj::Project.open(runner_project_path)
            
            # Forcibly turn off Apple's "Automatically Manage Signing" system
            runner_project.root_object.attributes['TargetAttributes']&.each do |target_id, target_attributes|
              target_attributes['ProvisioningStyle'] = 'Manual'
            end
            
            runner_project.targets.each do |target|
              if target.name == "Runner"
                target.build_configurations.each do |config|
                  # Fix main app headers
                  config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
                  
                  # Erase all signing signatures
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                  config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                  config.build_settings['CODE_SIGN_IDENTITY'] = ''
                  config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
                  config.build_settings['DEVELOPMENT_TEAM'] = ''
                end
              end
            end
            runner_project.save
          end
          EOF

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Create IPA archive
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas.ipa
          path: biogas.ipa