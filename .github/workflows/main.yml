name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Generate Native Platforms
        run: |
          rm -rf ios/
          rm -rf android/
          flutter create --platforms=android,ios .

      - name: Install dependencies
        run: flutter pub get

      - name: Inject Real GoogleService-Info.plist
        run: |
          mkdir -p ios/Runner
          cat > ios/Runner/GoogleService-Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>API_KEY</key>
              <string>AIzaSyC-siZ2Z3VQU3bbMjsfflauRzZRdjfiEKA</string>
              <key>GCM_SENDER_ID</key>
              <string>25429940980</string>
              <key>PLIST_VERSION</key>
              <string>1</string>
              <key>BUNDLE_ID</key>
              <string>com.example.biogas</string>
              <key>PROJECT_ID</key>
              <string>biogas11</string>
              <key>STORAGE_BUCKET</key>
              <string>biogas11.firebasestorage.app</string>
              <key>IS_ADS_ENABLED</key>
              <false/>
              <key>IS_ANALYTICS_ENABLED</key>
              <false/>
              <key>IS_APPINVITE_ENABLED</key>
              <true/>
              <key>IS_GCM_ENABLED</key>
              <true/>
              <key>IS_SIGNIN_ENABLED</key>
              <true/>
              <key>GOOGLE_APP_ID</key>
              <string>1:25429940980:ios:45d0365544b4624c755ca1</string>
              <key>DATABASE_URL</key>
              <string>https://biogas11-default-rtdb.asia-southeast1.firebasedatabase.app</string>
          </dict>
          </plist>
          EOF

      - name: Generate Podfile
        run: flutter build ios --config-only --no-codesign
        
      - name: Fix Xcode 16 Non-Modular Headers (Pods & Runner)
        run: |
          # 1. Strip out the default post_install block created by Flutter
          sed -i '' '/post_install do |installer|/,/^end/d' ios/Podfile
          
          # 2. Append a robust custom post_install script to the Podfile
          cat << 'EOF' >> ios/Podfile
          
          post_install do |installer|
            # Apply fix to all Firebase and third-party CocoaPods
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
              end
            end
            
            # Apply fix directly to the main Runner project so Xcode compiles smoothly
            runner_project_path = File.expand_path("../Runner.xcodeproj", __FILE__)
            runner_project = Xcodeproj::Project.open(runner_project_path)
            runner_project.targets.each do |target|
              if target.name == "Runner"
                target.build_configurations.each do |config|
                  config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
                end
              end
            end
            runner_project.save
          end
          EOF

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Create IPA archive
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas.ipa
          path: biogas.ipa