name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Generate Native Platforms
        run: |
          rm -rf ios/
          rm -rf android/
          flutter create --org com.example --project-name biogas --platforms=android,ios .

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Podfile
        run: flutter build ios --config-only --no-codesign
        
      - name: Fix Xcode 16 Non-Modular Headers (Pods & Runner)
        run: |
          # Strip out default block
          sed -i '' '/post_install do |installer|/,/^end/d' ios/Podfile
          
          # Append robust custom override
          cat << 'EOF' >> ios/Podfile
          
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
              end
            end
            
            runner_project_path = File.expand_path("../Runner.xcodeproj", __FILE__)
            runner_project = Xcodeproj::Project.open(runner_project_path)
            runner_project.targets.each do |target|
              if target.name == "Runner"
                target.build_configurations.each do |config|
                  config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
                end
              end
            end
            runner_project.save
          end
          EOF

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Create IPA archive
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas.ipa
          path: biogas.ipa