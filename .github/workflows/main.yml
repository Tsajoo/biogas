name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      # Clean slate generation
      - name: Generate Native Platforms
        run: |
          rm -rf ios/
          rm -rf android/
          flutter create --platforms=android,ios .

      - name: Install dependencies
        run: flutter pub get

      # Injects your real Firebase configuration to fix the white screen crash
      - name: Inject Real GoogleService-Info.plist
        run: |
          mkdir -p ios/Runner
          cat > ios/Runner/GoogleService-Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>API_KEY</key>
              <string>AIzaSyC-siZ2Z3VQU3bbMjsfflauRzZRdjfiEKA</string>
              <key>GCM_SENDER_ID</key>
              <string>25429940980</string>
              <key>PLIST_VERSION</key>
              <string>1</string>
              <key>BUNDLE_ID</key>
              <string>com.example.biogas</string>
              <key>PROJECT_ID</key>
              <string>biogas11</string>
              <key>STORAGE_BUCKET</key>
              <string>biogas11.firebasestorage.app</string>
              <key>IS_ADS_ENABLED</key>
              <false/>
              <key>IS_ANALYTICS_ENABLED</key>
              <false/>
              <key>IS_APPINVITE_ENABLED</key>
              <true/>
              <key>IS_GCM_ENABLED</key>
              <true/>
              <key>IS_SIGNIN_ENABLED</key>
              <true/>
              <key>GOOGLE_APP_ID</key>
              <string>1:25429940980:ios:45d0365544b4624c755ca1</string>
              <key>DATABASE_URL</key>
              <string>https://biogas11-default-rtdb.asia-southeast1.firebasedatabase.app</string>
          </dict>
          </plist>
          EOF

      # Added --no-codesign here so it generates configurations without searching for Apple profiles
      - name: Generate Podfile
        run: flutter build ios --config-only --no-codesign
        
      # Fixes the Xcode 16 strict non-modular header issue with Firebase
      - name: Fix Xcode 16 Non-Modular Headers
        run: |
          perl -pi -e "s/flutter_additional_ios_build_settings\(target\)/flutter_additional_ios_build_settings(target)\n      target.build_configurations.each do |config|\n        config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'\n      end/g" ios/Podfile

      # Compiles the app securely with your database integration active
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      # Packs the binary structure for TrollStore sideloading
      - name: Create IPA archive
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas.ipa
          path: biogas.ipa