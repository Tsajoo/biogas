name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Generate Native Platforms
        run: |
          rm -rf ios/
          rm -rf android/
          flutter create --platforms=android,ios .

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure GoogleService-Info.plist exists (placeholder)
        run: |
          mkdir -p ios/Runner
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            cat > ios/Runner/GoogleService-Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_GCM_ENABLED</key><false/>
            <key>IS_SIGNIN_ENABLED</key><false/>
            <key>GOOGLE_APP_ID</key><string>1:123456789:ios:abcdef</string>
            <key>GCM_SENDER_ID</key><string>123456789</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>BUNDLE_ID</key><string>com.example.biogas</string>
            <key>PROJECT_ID</key><string>biogas11</string>
            <key>STORAGE_BUCKET</key><string>biogas11.appspot.com</string>
          </dict>
          </plist>
          EOF
          fi

      # 1. This command generates the Podfile without triggering Xcode compilation yet
      - name: Generate Podfile
        run: flutter build ios --config-only
        
      # 2. Inject the CocoaPods patch to bypass Xcode 16 strict header rules
      - name: Fix Xcode 16 Non-Modular Headers
        run: |
          perl -pi -e "s/flutter_additional_ios_build_settings\(target\)/flutter_additional_ios_build_settings(target)\n      target.build_configurations.each do |config|\n        config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'\n      end/g" ios/Podfile

      # 3. Flutter notices the updated Podfile, automatically re-installs pods, and builds safely
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Create IPA archive
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas.ipa
          path: biogas.ipa