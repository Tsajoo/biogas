name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Uses latest stable Flutter to natively support Swift Package Manager (SPM)
      - name: Setup Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Generate Native Platforms
        run: flutter create --platforms=android,ios .

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure GoogleService-Info.plist exists (placeholder)
        run: |
          mkdir -p ios/Runner
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            cat > ios/Runner/GoogleService-Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_GCM_ENABLED</key><false/>
            <key>IS_SIGNIN_ENABLED</key><false/>
            <key>GOOGLE_APP_ID</key><string>1:123456789:ios:abcdef</string>
            <key>GCM_SENDER_ID</key><string>123456789</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>BUNDLE_ID</key><string>com.example.biogas</string>
            <key>PROJECT_ID</key><string>biogas11</string>
            <key>STORAGE_BUCKET</key><string>biogas11.appspot.com</string>
          </dict>
          </plist>
          EOF
          fi

      # Triggers SPM resolution automatically before building
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Create IPA archive
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas-unsigned
          path: biogas.ipa
          archive: false
