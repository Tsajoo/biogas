name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Generate Native Platforms
        run: |
          rm -rf ios/
          rm -rf android/
          flutter create --org com.example --project-name biogas --platforms=android,ios .

      - name: Install dependencies
        run: flutter pub get

      # Build for Simulator to bypass Apple's "Development Team" requirement
      - name: Build Unsigned Simulator App
        run: flutter build ios --simulator --release

      - name: Create IPA archive
        run: |
          mkdir -p Payload
          # Note: The path for simulator builds is slightly different
          cp -r build/ios/iphonesimulator/Runner.app Payload/
          zip -r biogas.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas.ipa
          path: biogas.ipa