name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Flutter ─────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      # ── 3. Disable Swift Package Manager ───────────────────────────────────
      #
      #  Flutter 3.44 enables SPM by default. firebase_core and
      #  firebase_database do not yet support SPM and fall back to
      #  CocoaPods — but in fallback mode they still trigger the
      #  non-modular header error differently. Disabling SPM globally
      #  forces a clean CocoaPods-only build path.
      #
      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      # ── 4. Regenerate native platforms ─────────────────────────────────────
      # bundle ID = com.example.biogas — matches your Firebase project
      - name: Regenerate iOS & Android
        run: |
          rm -rf ios/ android/
          flutter create --org com.example --project-name biogas --platforms=android,ios .

      # ── 5. Patch project.pbxproj — disable signing ─────────────────────────
      #
      #  Flutter's Dart tooling reads project.pbxproj and throws
      #  "Development Team required" before calling xcodebuild.
      #  Setting CODE_SIGNING_ALLOWED=NO in every config block
      #  bypasses that check entirely.
      #
      - name: Patch project.pbxproj
        run: |
          python3 - <<'PYEOF'
          import re, pathlib

          pbx = pathlib.Path("ios/Runner.xcodeproj/project.pbxproj")
          txt = pbx.read_text()

          def patch_block(match):
              block = match.group(0)
              overrides = {
                  "CODE_SIGNING_ALLOWED":           "NO",
                  "CODE_SIGNING_REQUIRED":          "NO",
                  "CODE_SIGN_STYLE":                "Manual",
                  "CODE_SIGN_IDENTITY":             '""',
                  "PROVISIONING_PROFILE_SPECIFIER": '""',
                  "DEVELOPMENT_TEAM":               '""',
              }
              for key, val in overrides.items():
                  block, n = re.subn(rf'{key} = [^;]+;', f'{key} = {val};', block)
                  if n == 0:
                      block = block.replace(
                          "buildSettings = {",
                          f"buildSettings = {{\n\t\t\t\t{key} = {val};"
                      )
              return block

          txt = re.sub(r'buildSettings = \{[^}]*\}', patch_block, txt, flags=re.DOTALL)
          txt = re.sub(r'ProvisioningStyle = Automatic;', 'ProvisioningStyle = Manual;', txt)
          pbx.write_text(txt)
          print("pbxproj patched OK")
          PYEOF

      # ── 6. Patch Info.plist ────────────────────────────────────────────────
      #
      #  ios/ is recreated every run — re-apply ATS fix each time.
      #  Without NSAllowsArbitraryLoads, Firebase HTTPS calls silently
      #  fail on jailbroken iOS and the app shows a white screen.
      #
      - name: Patch Info.plist
        run: |
          python3 - <<'PYEOF'
          import plistlib, pathlib

          p = pathlib.Path("ios/Runner/Info.plist")
          with p.open("rb") as f:
              data = plistlib.load(f)

          data.setdefault("NSAppTransportSecurity", {})
          data["NSAppTransportSecurity"]["NSAllowsArbitraryLoads"] = True

          modes = data.setdefault("UIBackgroundModes", [])
          for m in ["fetch", "remote-notification"]:
              if m not in modes:
                  modes.append(m)

          with p.open("wb") as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          print("Info.plist patched OK")
          PYEOF

      # ── 7. Install pub dependencies ────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 8. Write complete Podfile ──────────────────────────────────────────
      #
      #  ROOT CAUSE OF NON-MODULAR HEADER ERROR:
      #  Our previous approach used `sed` to strip Flutter's post_install
      #  block then appended our own. This is fragile — sed matches the
      #  first `^end` line it finds, which may be an inner `end` inside
      #  the flutter_additional_ios_build_settings helper, leaving a
      #  broken or duplicate post_install block that pod install ignores.
      #
      #  FIX: We write the ENTIRE Podfile from scratch with Python so
      #  there is exactly one post_install block, correctly structured,
      #  with CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES
      #  applied to every target and every configuration.
      #
      - name: Write Podfile
        run: |
          python3 - <<'PYEOF'
          import pathlib

          podfile = pathlib.Path("ios/Podfile")

          content = r"""
          # Auto-generated by CI — do not edit manually.
          platform :ios, '13.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug'   => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated = File.expand_path(
              File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__
            )
            raise "#{generated} must exist. Run flutter pub get first." unless File.exist?(generated)
            File.foreach(generated) do |line|
              m = line.match(/FLUTTER_ROOT\=(.*)/)
              return m[1].strip if m
            end
            raise "FLUTTER_ROOT not found in #{generated}."
          end

          require File.expand_path(
            File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root
          )

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))

            target 'RunnerTests' do
              inherit! :search_paths
            end
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)

              target.build_configurations.each do |config|
                # ── NON-MODULAR HEADER FIX ──────────────────────────────────
                # firebase_database and firebase_core include Firebase.h which
                # is a non-modular header. Without this flag Xcode treats it
                # as an error when use_modular_headers! is active globally.
                config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'

                # ── SIGNING STRIP ───────────────────────────────────────────
                config.build_settings['CODE_SIGNING_ALLOWED']  = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY']    = ''

                # ── DEPLOYMENT TARGET ───────────────────────────────────────
                # Suppress "target below minimum" warnings from Firebase pods
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end
          """.strip()

          podfile.write_text(content)
          print("Podfile written OK")
          PYEOF

      # ── 9. Build ───────────────────────────────────────────────────────────
      #
      #  flutter build ios runs `flutter assemble` (Dart → ARM binary) then
      #  xcodebuild. Do NOT replace this with a raw xcodebuild call — that
      #  skips assemble and produces a 47kb empty shell (parse error 303).
      #
      #  Flutter will run its own pod install internally here. Our Podfile
      #  written in Step 8 is what it will use, so the post_install block
      #  with the non-modular header fix will run at that point.
      #
      - name: Build unsigned app
        run: flutter build ios --release --no-codesign

      # ── 10. Verify binary ─────────────────────────────────────────────────
      - name: Verify Runner.app binary
        run: |
          APP="build/ios/iphoneos/Runner.app"
          BIN="$APP/Runner"
          [ -d "$APP" ] || { echo "Runner.app missing"; exit 1; }
          [ -f "$BIN" ] || { echo "Binary missing from bundle"; ls -lah "$APP"; exit 1; }
          BIN_BYTES=$(stat -f%z "$BIN")
          echo "App: $(du -sh $APP | cut -f1)  Binary: $(du -sh $BIN | cut -f1)  (${BIN_BYTES} bytes)"
          [ "$BIN_BYTES" -gt 1000000 ] || echo "WARNING: binary suspiciously small"

      # ── 11. Package IPA ───────────────────────────────────────────────────
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/
          echo "IPA: $(du -sh biogas.ipa)"

      # ── 12. Upload ────────────────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas-trollstore.ipa
          path: biogas.ipa