name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      # Flutter 3.44 enables SPM by default.
      # firebase_core / firebase_database don't support SPM yet.
      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      # bundle ID = com.example.biogas — matches Firebase project
      - name: Regenerate iOS & Android
        run: |
          rm -rf ios/ android/
          flutter create --org com.example --project-name biogas --platforms=android,ios .

      # Flutter's Dart tooling reads project.pbxproj and throws
      # "Development Team required" before calling xcodebuild.
      # CODE_SIGNING_ALLOWED=NO in every config block bypasses it.
      - name: Patch project.pbxproj — disable signing
        run: |
          python3 - <<'PYEOF'
          import re, pathlib
          pbx = pathlib.Path("ios/Runner.xcodeproj/project.pbxproj")
          txt = pbx.read_text()
          def patch_block(match):
              block = match.group(0)
              overrides = {
                  "CODE_SIGNING_ALLOWED":           "NO",
                  "CODE_SIGNING_REQUIRED":          "NO",
                  "CODE_SIGN_STYLE":                "Manual",
                  "CODE_SIGN_IDENTITY":             '""',
                  "PROVISIONING_PROFILE_SPECIFIER": '""',
                  "DEVELOPMENT_TEAM":               '""',
              }
              for key, val in overrides.items():
                  block, n = re.subn(rf'{key} = [^;]+;', f'{key} = {val};', block)
                  if n == 0:
                      block = block.replace(
                          "buildSettings = {",
                          f"buildSettings = {{\n\t\t\t\t{key} = {val};"
                      )
              return block
          txt = re.sub(r'buildSettings = \{[^}]*\}', patch_block, txt, flags=re.DOTALL)
          txt = re.sub(r'ProvisioningStyle = Automatic;', 'ProvisioningStyle = Manual;', txt)
          pbx.write_text(txt)
          print("pbxproj patched OK")
          PYEOF

      # ios/ is recreated every run — re-apply ATS fix each time.
      # Without NSAllowsArbitraryLoads Firebase calls silently fail → white screen.
      - name: Patch Info.plist
        run: |
          python3 - <<'PYEOF'
          import plistlib, pathlib
          p = pathlib.Path("ios/Runner/Info.plist")
          with p.open("rb") as f:
              data = plistlib.load(f)
          data.setdefault("NSAppTransportSecurity", {})
          data["NSAppTransportSecurity"]["NSAllowsArbitraryLoads"] = True
          modes = data.setdefault("UIBackgroundModes", [])
          for m in ["fetch", "remote-notification"]:
              if m not in modes:
                  modes.append(m)
          with p.open("wb") as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          print("Info.plist patched OK")
          PYEOF

      - name: Flutter pub get
        run: flutter pub get

      # ROOT CAUSE OF NON-MODULAR HEADER ERROR — explained:
      #
      # `use_modular_headers!` tells CocoaPods to add DEFINES_MODULE=YES
      # to every pod. When firebase_database gets DEFINES_MODULE=YES it
      # becomes a "strict framework module". Xcode then enforces that no
      # non-modular headers can be #included inside it. But firebase_database
      # 10.5.7 includes Firebase.h which IS non-modular → error.
      #
      # Setting CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES
      # fights the symptom but CocoaPods-generated xcconfig files can
      # override it before Xcode sees it.
      #
      # THE REAL FIX: remove `use_modular_headers!` entirely.
      # Firebase ships its own module maps and does not need this directive.
      # `use_frameworks!` alone is sufficient for Flutter + Firebase to build.
      #
      # We write the whole Podfile from scratch (not sed) so there is
      # exactly one post_install block with no indentation issues.
      - name: Write Podfile
        run: |
          cat > ios/Podfile << 'PODEOF'
# Generated by CI. Do not edit.
platform :ios, '13.0'
ENV['COCOAPODS_DISABLE_STATS'] = 'true'

project 'Runner', {
  'Debug'   => :debug,
  'Profile' => :release,
  'Release' => :release,
}

def flutter_root
  generated = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
  raise "#{generated} must exist. Run flutter pub get first." unless File.exist?(generated)
  File.foreach(generated) do |line|
    m = line.match(/FLUTTER_ROOT\=(.*)/)
    return m[1].strip if m
  end
  raise "FLUTTER_ROOT not found in #{generated}."
end

require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

flutter_ios_podfile_setup

target 'Runner' do
  use_frameworks!
  # NOTE: use_modular_headers! intentionally omitted.
  # It sets DEFINES_MODULE=YES on all pods, turning firebase_database
  # into a strict framework module. Xcode then rejects Firebase.h as
  # a non-modular include → build error. Firebase ships its own module
  # maps so this directive is not needed.

  flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))

  target 'RunnerTests' do
    inherit! :search_paths
  end
end

post_install do |installer|
  installer.pods_project.targets.each do |target|
    flutter_additional_ios_build_settings(target)
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
      config.build_settings['CODE_SIGNING_ALLOWED']       = 'NO'
      config.build_settings['CODE_SIGNING_REQUIRED']      = 'NO'
      config.build_settings['CODE_SIGN_IDENTITY']         = ''
    end
  end
end
PODEOF

      # flutter build ios runs flutter assemble (Dart → ARM binary) then
      # xcodebuild. Do NOT replace with raw xcodebuild — that skips
      # assemble and produces a 47kb empty shell (parse error 303).
      - name: Build unsigned app
        run: flutter build ios --release --no-codesign

      - name: Verify binary exists
        run: |
          APP="build/ios/iphoneos/Runner.app"
          BIN="$APP/Runner"
          [ -d "$APP" ] || { echo "Runner.app missing"; exit 1; }
          [ -f "$BIN" ] || { echo "Binary missing — assemble failed"; ls -lah "$APP"; exit 1; }
          BIN_BYTES=$(stat -f%z "$BIN")
          echo "App: $(du -sh $APP | cut -f1)  Binary: $(du -sh $BIN | cut -f1)  (${BIN_BYTES} bytes)"
          [ "$BIN_BYTES" -gt 1000000 ] || echo "WARNING: binary suspiciously small"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/
          echo "IPA: $(du -sh biogas.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas-trollstore.ipa
          path: biogas.ipa