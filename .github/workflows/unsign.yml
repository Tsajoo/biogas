name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'   # compatible with fl_chart 0.70.2
          channel: 'stable'

      # Remove the android folder completely – it’s not needed for iOS
      - name: Remove Android folder (to avoid embedding v2 error)
        run: rm -rf android

      - name: Install dependencies
        run: flutter pub get

      # Generate iOS project if missing
      - name: Generate iOS project
        run: flutter create --platforms=ios .

      # Copy Firebase config (you must have this file in your repo)
      # If you don't have it, download GoogleService-Info.plist from Firebase Console
      # and place it in ios/Runner/ before committing.
      - name: Ensure GoogleService-Info.plist exists
        run: |
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            echo "ERROR: Missing ios/Runner/GoogleService-Info.plist"
            echo "Download it from Firebase Console and commit it."
            exit 1
          fi

      # Build unsigned IPA using Flutter’s built-in command (simpler)
      - name: Build iOS app (unsigned)
        run: flutter build ios --release --no-codesign

      # Package .app into .ipa
      - name: Create IPA archive
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas-unsigned
          path: biogas.ipa
