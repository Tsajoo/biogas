name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # Remove the android folder to avoid Android embedding v2 error
      - name: Remove android folder
        run: rm -rf android

      # Generate iOS project (if missing)
      - name: Generate iOS project
        run: flutter create --platforms=ios .

      # Build the iOS app without code signing
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      # Package the .app into an .ipa
      - name: Create IPA archive
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas-unsigned
          path: biogas.ipa
